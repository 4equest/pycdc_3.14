name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update (for example, v1.2.3)
        required: true
        type: string
      release_name:
        description: Optional title for a newly created release (existing release titles are preserved)
        required: false
        type: string
      prerelease:
        description: Mark a newly created release as a prerelease (existing release metadata is preserved)
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: manual-release-${{ github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve release source
    runs-on: ubuntu-latest
    outputs:
      source_ref: ${{ steps.resolve.outputs.source_ref }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}

    steps:
      - name: Checkout repository metadata
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve build source
        id: resolve
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "source_ref=refs/tags/$TAG" >> "$GITHUB_OUTPUT"
            echo "source_sha=$(git rev-list -n 1 "refs/tags/$TAG")" >> "$GITHUB_OUTPUT"
          else
            echo "source_ref=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
            echo "source_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          fi

  build-linux:
    name: Build Linux binaries
    runs-on: ubuntu-latest
    needs:
      - prepare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_ref }}

      - name: Configure Linux build
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Linux binaries
        run: cmake --build build --parallel

      - name: Package Linux release archive
        shell: bash
        run: |
          set -euo pipefail
          stage_dir="dist/pycdc-tools-linux-x64"
          mkdir -p "$stage_dir"
          cp build/pycdc "$stage_dir/"
          cp build/pycdas "$stage_dir/"
          cp LICENSE "$stage_dir/"
          cp README.markdown "$stage_dir/"
          tar -C dist -czf dist/pycdc-tools-linux-x64.tar.gz pycdc-tools-linux-x64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: pycdc-tools-linux-x64
          path: dist/pycdc-tools-linux-x64.tar.gz

  build-windows:
    name: Build Windows binaries
    runs-on: windows-latest
    needs:
      - prepare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_ref }}

      - name: Build Windows binaries
        shell: pwsh
        run: .\build_msvc.bat

      - name: Package Windows release archive
        shell: pwsh
        run: |
          $stageDir = Join-Path $PWD 'dist\pycdc-tools-windows-x64'
          New-Item -ItemType Directory -Path $stageDir -Force | Out-Null
          Copy-Item 'build\Release\pycdc.exe' $stageDir
          Copy-Item 'build\Release\pycdas.exe' $stageDir
          Copy-Item 'LICENSE' $stageDir
          Copy-Item 'README.markdown' $stageDir
          Compress-Archive -Path "$stageDir\*" -DestinationPath 'dist\pycdc-tools-windows-x64.zip' -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: pycdc-tools-windows-x64
          path: dist/pycdc-tools-windows-x64.zip

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-linux
      - build-windows

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: pycdc-tools-linux-x64
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: pycdc-tools-windows-x64
          path: dist

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}
          RELEASE_NAME: ${{ github.event.inputs.release_name }}
          PRERELEASE: ${{ github.event.inputs.prerelease }}
        run: |
          set -euo pipefail

          title="${RELEASE_NAME}"
          if [ -z "$title" ]; then
            title="$TAG"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; metadata is preserved and assets will be replaced."
          else
            args=("$TAG" "--title" "$title" "--target" "${{ needs.prepare.outputs.source_sha }}" "--generate-notes")
            if [ "$PRERELEASE" = "true" ]; then
              args+=("--prerelease")
            fi
            gh release create "${args[@]}"
          fi

          gh release upload "$TAG" dist/* --clobber
